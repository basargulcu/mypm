projects:
  - key: mypm
    dir: mypm
    type: python

  - key: my_gcp_project
    dir: my_gcp_project
    type: terraform
    gcp_project_id: my-gcp-project-id
    commands:
      - name: deploy
        cmd: gh workflow run deploy.yml --repo org/my_gcp_project
      - name: logs
        cmd: gcloud logging read "severity>=ERROR" --limit 50

  - key: my_python_project
    dir: my_python_project
    type: python
    commands:
      - name: test
        cmd: uv run pytest tests/
